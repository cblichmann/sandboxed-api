name: CMake

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-18.04]

    steps:
    - uses: actions/checkout@v2

    - name: Cache dependencies
      uses: actions/cache@v2
      env:
        cache-name: cache-deps
      with:
        path: ${{ runner.workspace }}/build/_deps
        key: ${{ matrix.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/*.cmake') }}
        restore-keys: |
          ${{ matrix.os }}-build-${{ env.cache-name }}-

    - name: Install ninja-build tool
      uses: seanmiddleditch/gha-setup-ninja@v3

    - name: Create Build Environment
      run: |
        pip3 install absl-py clang
        cmake -E make_directory ${{ runner.workspace }}/build

    - name: Configure CMake
      working-directory: ${{ runner.workspace }}/build
      run: cmake $GITHUB_WORKSPACE -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build
      working-directory: ${{ runner.workspace }}/build
      run: cmake --build . --config $BUILD_TYPE

    # TODO(cblichmann): Before enabling this, make sure all OSS tests pass
    #- name: Test
    #  working-directory: ${{ runner.workspace }}/build
    #  run: ctest -C $BUILD_TYPE
